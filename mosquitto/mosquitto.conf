# Mosquitto Configuration with MySQL Persistence
# Place this in /etc/mosquitto/conf.d/surveillance.conf

# MQTT over TCP
listener 1883

# MQTT over SSL/TLS
listener 8883
cafile /etc/mosquitto/ca_certificates/ca.crt
certfile /etc/mosquitto/certs/server.crt
keyfile /etc/mosquitto/certs/server.key

# Persistence to MySQL
# Install mosquitto-auth-plug or use a Python bridge script

# Alternative: Use log to file and parse with Python script
log_dest file /var/log/mosquitto/surveillance.log
log_type all

# Or use mosquitto-auth-plug with MySQL backend
# auth_plugin /usr/lib/mosquitto-auth-plug/auth-plug.so
# auth_opt_backends mysql
# auth_opt_host localhost
# auth_opt_port 3306
# auth_opt_dbname surveillance_db
# auth_opt_user root
# auth_opt_pass your_password
